<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8"/>
		<title>Morpion</title>
		<style>
			table 
			{
				border-collapse: collapse;
                position: relative;
			}

			td
			{
				border: 1px solid black;
				width: 150px;
				height: 150px;
				font-size: 30px;
				text-align: center;
				cursor: pointer;
			}

			td:hover
			{
				background-color: #ffc;
			}
		</style>
	</head>
	<body>
		<table>
			<tr><td></td><td></td><td></td></tr>
			<tr><td></td><td></td><td></td></tr>
			<tr><td></td><td></td><td></td></tr>
		</table>
		<script>
            let tds=document.querySelectorAll('td');
            for(let i=0;i<tds.length;i++)
			{
			  tds[i].addEventListener('click',function (event) 
			{
                if (this.textContent===''){
               this.style.fontSize=100+'px';
			   this.textContent=joueur;
               if (joueur==='X'){
                joueur='O';
               } 
               else{
                joueur='X';
               }
            }
            });
			}
            let joueur='X';
			
		</script>
	</body>
</html>
